buildscript {
    repositories {
        gradlePluginPortal()
    }
    dependencies {
        classpath 'gradle.plugin.com.github.johnrengelman:shadow:7.1.2'
    }
}

apply plugin: 'com.github.johnrengelman.shadow'
apply plugin: 'maven-publish'
apply plugin: 'signing'
apply plugin: 'java'

group 'net.programmer.igoodie'
version '0.0.8'

sourceCompatibility = 1.8

repositories {
    mavenCentral()
    maven { url 'https://jitpack.io' }
}

dependencies {
    compileOnly 'org.jetbrains:annotations:23.1.0'
    testImplementation 'org.jetbrains:annotations:23.1.0'

    // RuntimeGoodies
    implementation 'com.github.iGoodie.RuntimeGoodies:core:1.3.6'
    implementation 'com.github.iGoodie.RuntimeGoodies:json:1.3.6'

    // Rhino - Used in JS Engine
    shadow 'org.mozilla:rhino:1.7.14'
    testImplementation 'org.mozilla:rhino:1.7.14'

    // Semver4j - SemVer parser
    implementation 'com.vdurmont:semver4j:3.1.0'

    // JUnit
    testRuntimeOnly group: 'org.junit.jupiter', name: 'junit-jupiter-engine', version: '5.7.0'
    testImplementation group: 'org.junit.jupiter', name: 'junit-jupiter-api', version: '5.7.0'
    testImplementation group: 'com.google.guava', name: 'guava', version: '30.1-jre'
}

shadowJar {
    archiveName = "$baseName-$version.$extension"
    configurations = [project.configurations.shadow]
    classifier ""
    relocate 'org.mozilla', 'tslshadow.org.mozilla'
}

artifacts {
    archives shadowJar
}

test {
    useJUnitPlatform()
}

jar {
    manifest {
        attributes([
                "Specification-Title"     : "tsl",
                "Specification-Vendor"    : project.getGroup(),
                "Specification-Version"   : "1.0",
                "Implementation-Title"    : project.getName(),
                "Implementation-Version"  : project.getVersion(),
                "Implementation-Vendor"   : project.getGroup(),
                "Implementation-Timestamp": new Date().format("yyyy-MM-dd'T'HH:mm:ssZ")
        ])
    }
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            groupId = 'net.programmer.igoodie'
            artifactId = "TheSpawnLanguage"
            version = "$version"
            from components.java
        }
    }
}